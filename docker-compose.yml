version: '3.8'

services:
  timescale:
    image: timescale/timescaledb:2.13.0-pg16
    container_name: crossbow-timescale
    environment:
      POSTGRES_DB: crossbow_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - timescale-data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: crossbow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crossbow-backend
    ports:
      - "8080:8080"
    environment:
      - DATABASE_HOST=timescale
      - DATABASE_PORT=5432
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=postgres
      - DATABASE_DBNAME=crossbow_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      timescale:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/config:/app/config

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crossbow-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  timescale-data:
  redis-data:
